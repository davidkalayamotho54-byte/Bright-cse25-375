<nav class="navbar navbar-expand-lg">

  <h3>Feedback</h3>
</header>

    
    <section id="home">
    <h1>WE VALUE YOUR FEEDBACK</h1>
    <p class="subtitle">Help us improve by sharing your thoughts with us.</p>
    </section>

<form>
    
    <div class="mb-3">
        <label class="form-label">Full Name:</label>
        <input type="fullname" class="form-control" required>
    </div>
    
    <div class="mb-3">
        <label class="form-label">Email Address:</label>
       <input type="email" class="form-control" required>
    </div>

    
        <br>

    
    <div class="mb-3">
        <label class="form-label">Subject:</label>
         <select id="subject" name="subject">
                  <option value="">Select a subject </option>
              <option value="customer service">Customer Service</option>
              <option value="delivery">Delivery</option>
              <option value="Website experience"></option>
         </select>
        
        </div>
     <br>
    
     <div class="mb-3">
         <label class="form-label">Your Feedback</label>
         <textarea class="form-control" rows="4"></textarea>
     </div>

    
    <br>

    
    <div>
    <p>Would you like us to contact you?</p>
    <input type="radio" id="yes" name="yes" value="yes">
    <label for="yes">Yes, please contact me </label>
       <input type="radio" id="no" name="yes" value="no">
     <label for="no">No, Thank you </label>
    </div>
<br>

    <div>
<input type="submit" value="Submit Feedback">
    </div>

    <br>
    
</form>
